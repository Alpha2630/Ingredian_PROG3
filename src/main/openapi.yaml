openapi: 3.0.3
info:
  title: API Gestion des Ingrédients
  description: API REST pour la gestion des ingrédients et du stock
  version: 1.0.0

servers:
  - url: http://localhost:8080/api

paths:

  /ingredients:
    get:
      summary: Lister tous les ingrédients
      responses:
        200:
          description: Liste des ingrédients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        500:
          description: Erreur serveur

    post:
      summary: Créer plusieurs ingrédients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
      responses:
        201:
          description: Ingrédients créés avec succès
        400:
          description: Données invalides
        500:
          description: Erreur serveur

  /ingredients/{id}:
    get:
      summary: Récupérer un ingrédient par ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Ingrédient trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        404:
          description: Ingrédient non trouvé
        500:
          description: Erreur serveur

  /ingredients/{id}/stock:
    get:
      summary: Obtenir le stock d’un ingrédient à un instant donné
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: datetime
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        200:
          description: Stock calculé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
        400:
          description: Paramètres invalides
        500:
          description: Erreur serveur

  /stocks/statistics:
    get:
      summary: Obtenir les statistiques de stock
      parameters:
        - name: periodicity
          in: query
          required: true
          schema:
            type: string
            enum: [DAY, WEEK, MONTH]
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        200:
          description: Statistiques retournées
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    type: number
        400:
          description: Paramètres invalides
        500:
          description: Erreur serveur

components:

  schemas:

    Ingredient:
      type: object
      required:
        - name
        - category
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Tomate
        price:
          type: number
          format: double
          example: 500.0
        category:
          $ref: '#/components/schemas/Category'
        stockMovements:
          type: array
          items:
            $ref: '#/components/schemas/StockMovement'

    StockMovement:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: number
          example: 10.5
        type:
          $ref: '#/components/schemas/MovementType'
        unit:
          $ref: '#/components/schemas/Unit'
        creationDatetime:
          type: string
          format: date-time

    StockValue:
      type: object
      properties:
        quantity:
          type: number
          example: 25.0
        unit:
          $ref: '#/components/schemas/Unit'

    Category:
      type: string
      enum:
        - VEGETABLE
        - MEAT
        - FISH
        - DAIRY
        - SPICE

    MovementType:
      type: string
      enum:
        - IN
        - OUT

    Unit:
      type: string
      enum:
        - KG
        - G
        - L
        - ML
        - UNIT